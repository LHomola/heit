name: CI

# This workflow runs on every push to any branch and every PR open.
on:
  push:
  pull_request:

# If a newer commit is pushed on the same branch while the previous commit's CI run is still in progress, cancel the older run. 
# This ensures that the result is based on the latest code
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # parallel lint jobs (one doesn't depend on the result of the other)
  # these jobs are executed first before the slower more expensive jobs
  
  lint-backend:
    name: Lint backend (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        # Ensure to use the same version of Python as the one used by backend/Dockerfile
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Run ruff
        working-directory: backend
        run: ruff check .

  lint-frontend:
    name: Lint frontend (eslint)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        # Ensure to use the same vesion of Node as the one used by frontend/Dockerfile
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # Using npm ci (instead of npm install) to make sure that any dependency mismatch results in an error
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  # parallel test jobs
  test-backend:
    name: Test backend (pytest)
    runs-on: ubuntu-latest

    # Spin up service containers to let the test job run against a real Postgres
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: heit_test
          POSTGRES_USER: heit_user
          POSTGRES_PASSWORD: heit_password
        ports:
          - 5432:5432
        # Ensure that the database is ready before proceeding
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: backend
        env:
          # Override database URL as in CI the Postgres service is reachable through localhost via the port mapping declared above
          TEST_DATABASE_URL: postgresql://heit_user:heit_password@localhost:5432/heit_test
        run: pytest tests/

  test-frontend:
    name: Test frontend (vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run vitest
        working-directory: frontend
        run: npm test

  # This job runs after the previous lint and test jobs have successfully finished 
  # The following job builds the backend image, runs Trivy against it looking for known CVEs,
  # generates a Software bill of materials and then pushes the image to GitHub Container Registry

  build-scan-push:
    name: Build, scan, and push backend image
    runs-on: ubuntu-latest
    needs:
      - lint-backend
      - lint-frontend
      - test-backend
      - test-frontend

    # Give the minimum permissions needed by this job (least privilege principle)
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # GITHUB_TOKEN is automatically provisioned by GitHub for every workflow run
        # The login then persists for the duration of the job and gets discarded when the run is finished
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        # "sha-<long sha>" is used for every build
        # "latest" is only used on pushes to main so that :latest in the registry never points at a feature-branch
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/heit-backend
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image (load locally for scanning)
        # Build the image and load it into the runner's local Docker daemon
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          push: false
          tags: heit-backend:scan
          labels: ${{ steps.meta.outputs.labels }}

      - name: Scan image with Trivy (table for log visibility)
        # Run Trivy in table format first so that anyone reading the workflow log can see exactly which CVEs the gate is reacting to
        # exit-code is set to 0 so that this step doesn't block the build (it only reports).
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: heit-backend:scan
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: true
          
      - name: Scan image with Trivy
        # Trivy is an open source scanner designed to catch known CVEs in operating system packages
        # Setting ignore-unfixed to true to make sure that CVEs with no published fix do not cause a failure without a way to resolve
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: heit-backend:scan
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to Security tab
        # GitHub Security tab renders sarif natively turning the findings into clickable items with details
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      # Generate Software bill of materials
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: heit-backend:scan
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM as artefact
        # Attach the SBOM to the workflow run (can be downloaded for 30 days)
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json
          retention-days: 30

      - name: Push image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}