name: CD - Staging

# This is started automatically after the the CI workflow finishes successfully on the main branch.
# Using workflow_run ensures that only code that has already passed all tests and linting can be deployed. 
# Nothing gets deployed if CI fails.
# workflow_dispatch is used here to allow a deploy to be triggered manually.
# It also enables deploying a specific (good) version.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Git SHA of the image to be deployed"
        required: false
        type: string

# To prevent Render from from getting confused, only one staging deploy can run at a time
concurrency:
  group: cd-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Render staging
    runs-on: ubuntu-latest

    # Only run this job if the CI was successful or if it's being run manually
    if: >-
      ${{ github.event_name == 'workflow_dispatch'
          || github.event.workflow_run.conclusion == 'success' }}

    # Use "staging" environment and environment secrets set up in GitHub
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    permissions:
      contents: read

    steps:
      - name: Determine which image to use
        # retrieve the specific image tag that was built in CI so that every deploy points at one specific build artefact,
        # and the SHA is recorded in workflow run history
        id: image
        env:
          RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          INPUT_SHA: ${{ inputs.image_sha }}
        run: |
          SHA="${INPUT_SHA:-${RUN_SHA:-${GITHUB_SHA}}}"
          if [ -z "$SHA" ]; then
            echo "Could not find an SHA to deploy!" >&2
            exit 1
          fi
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/heit-backend:sha-${SHA}"
          echo "ref=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Deploying image: ${IMAGE}"

      - name: Trigger Render deploy
        # Render API is called directly so that we can tell it which image tag to use
        # This then ensures that the environment runs the same image that just passed CI
        id: deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_STAGING_SERVICE_ID }}
          IMAGE_REF: ${{ steps.image.outputs.ref }}
        run: |
          # Ensure that the secrets exist
          : "${RENDER_API_KEY:?RENDER_API_KEY is missing}"
          : "${RENDER_SERVICE_ID:?RENDER_STAGING_SERVICE_ID is missing}"

          RESPONSE=$(curl --fail-with-body --silent --show-error \
            -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "{\"imageUrl\": \"${IMAGE_REF}\"}")

          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id')
          if [ -z "$DEPLOY_ID" ] || [ "$DEPLOY_ID" = "null" ]; then
            echo "Render error. Response: $RESPONSE" >&2
            exit 1
          fi
          echo "deploy_id=${DEPLOY_ID}" >> "$GITHUB_OUTPUT"
          echo "Render deploy started: ${DEPLOY_ID}"

      - name: Wait for Render to finish
        # The below loop checks every 15 seconds whether the new container has been spun up
        # In case there are any problems, a 15 min timeout is configured to terminate the attempt
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_STAGING_SERVICE_ID }}
          DEPLOY_ID: ${{ steps.deploy.outputs.deploy_id }}
        run: |
          DEADLINE=$((SECONDS + 900))
          while [ $SECONDS -lt $DEADLINE ]; do
            STATUS=$(curl --fail-with-body --silent --show-error \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Accept: application/json" \
              | jq -r '.status')

            echo "Status: ${STATUS}"
            case "$STATUS" in
              live)
                echo "App is live now!."
                exit 0
                ;;
              build_failed|update_failed|canceled|deactivated)
                echo "Deploy failed with status: ${STATUS}" >&2
                exit 1
                ;;
              *)
                sleep 15
                ;;
            esac
          done
          echo "Timed out after 15 minutes waiting for render." >&2
          exit 1

      - name: Check /health endpoint
        # This step confirms that the container is actually responding after haviung booted up
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
        run: |
          : "${STAGING_URL:?STAGING_URL is not set up in Environment variables}"
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error --max-time 10 "${STAGING_URL}/health"; then
              echo ""
              echo "Health check successful!"
              exit 0
            fi
            echo "/health endpoint has not responded yet... (attempt ${attempt})"
            sleep 10
          done
          echo "/health endpoint did not respond after 5 attempts" >&2
          exit 1